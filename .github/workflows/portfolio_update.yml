name: Update Portfolio Projects

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run GitHub Projects Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Swathi2626
        run: |
          python scripts/fetch_projects.py

      - name: Commit updated projects.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data/projects.json

          git diff --cached --quiet || git commit -m "Auto-update GitHub projects"

      - name: Push changes
        run: |
          git push